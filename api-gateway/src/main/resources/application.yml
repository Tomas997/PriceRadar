spring:
  application:
    name: api-gateway

server:
  port: 8080

gateway:
  parser-url: ${PARSER_SERVICE_URL:http://localhost:8082}
  product-url: ${PRODUCT_SERVICE_URL:http://localhost:8081}
  user-url: ${USER_SERVICE_URL:http://localhost:8083}

cors:
  allowed-origin: ${CORS_ALLOWED_ORIGIN:http://localhost:8084}

internal:
  api:
    key: ${INTERNAL_API_KEY:}

jwt:
  secret: ${JWT_SECRET}

logging:
  level:
    org.example.apigateway: DEBUG