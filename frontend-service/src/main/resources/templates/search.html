<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Search – PriceRadar</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: sans-serif; background: #0f0f1a; color: #ddd; margin: 0; }
    .container { max-width: 960px; margin: 0 auto; padding: 24px; }
    .search-bar { display: flex; gap: 8px; margin-bottom: 8px; }
    .search-bar input { flex: 1; padding: 10px; background: #1a1a2e; border: 1px solid #333; color: #ddd; border-radius: 4px; font-size: 15px; }
    .search-bar button { padding: 10px 20px; background: #e94560; border: none; color: white; border-radius: 4px; cursor: pointer; }
    .search-hint { font-size: 12px; color: #555; margin-bottom: 20px; }
    .marketplace { margin-bottom: 24px; }
    .marketplace-header { display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #333; padding-bottom: 6px; margin-bottom: 8px; }
    .marketplace-header h2 { font-size: 16px; color: #aaa; margin: 0; }
    .marketplace-header .one-only { font-size: 12px; color: #666; }
    .radio-row { display: flex; align-items: flex-start; gap: 12px; padding: 10px 8px; border-bottom: 1px solid #1e1e30; cursor: pointer; border-radius: 4px; transition: background 0.15s; }
    .radio-row:hover { background: #1a1a2e; }
    .radio-row input[type=radio] { margin-top: 3px; accent-color: #e94560; width: 16px; height: 16px; flex-shrink: 0; cursor: pointer; }
    .product-info { flex: 1; }
    .product-title a { color: #7eb8f7; text-decoration: none; font-size: 14px; }
    .product-title a:hover { text-decoration: underline; }
    .product-price { font-size: 15px; font-weight: bold; color: #4ade80; margin-top: 3px; }
    .product-stock { font-size: 12px; margin-top: 2px; }
    .in-stock { color: #4ade80; }
    .out-stock { color: #e94560; }
    .track-bar { position: sticky; bottom: 0; background: #0f0f1a; border-top: 1px solid #333; padding: 14px 0; margin-top: 16px; display: flex; align-items: center; justify-content: space-between; gap: 16px; }
    .track-bar p { margin: 0; font-size: 13px; color: #666; }
    .track-all-btn { padding: 11px 28px; background: #e94560; border: none; color: white; border-radius: 5px; cursor: pointer; font-size: 15px; font-weight: bold; white-space: nowrap; }
    .track-all-btn:hover { background: #c73650; }
    .alert { padding: 10px 14px; border-radius: 4px; margin-bottom: 16px; font-size: 14px; }
    .alert-success { background: #1a3a2e; color: #4ade80; }
    .alert-error { background: #3a1a1a; color: #e94560; }
    .empty { color: #555; text-align: center; padding: 40px; }
  </style>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container">
  <div class="alert alert-success" th:if="${success}" th:text="${success}"></div>
  <div class="alert alert-error" th:if="${error}" th:text="${error}"></div>

  <form method="get" th:action="@{/search}" class="search-bar">
    <input type="text" name="query" placeholder="Пошук товарів у Citrus, OpenShop, StoreInUA..."
           th:value="${query}" autofocus>
    <button type="submit">Знайти</button>
  </form>
  <p class="search-hint">Знайдіть товар, виберіть по 1 позиції з кожного магазину та натисніть «Слідкувати»</p>

  <div th:if="${results != null and !results.isEmpty()}">
    <form method="post" th:action="@{/tracked/group}">
      <input type="hidden" name="query" th:value="${query}">

      <div class="marketplace" th:each="group : ${results}">
        <div class="marketplace-header">
          <h2 th:text="${group.marketplace}">Marketplace</h2>
          <span class="one-only">— виберіть 1 товар</span>
        </div>
        <div th:if="${group.products.isEmpty()}" class="empty" style="padding:16px">
          Немає результатів
        </div>
        <label class="radio-row" th:each="p : ${group.products}">
          <input type="radio"
                 th:name="${group.marketplace.toLowerCase()}"
                 th:value="${group.marketplace + '||' + p.title + '||' + p.price + '||' + p.url + '||' + p.inStock}">
          <div class="product-info">
            <div class="product-title">
              <a th:href="${p.url}" target="_blank" th:text="${p.title}" onclick="event.stopPropagation()">Title</a>
            </div>
            <div class="product-price" th:text="${p.price + ' грн'}">0</div>
            <div class="product-stock">
              <span class="in-stock" th:if="${p.inStock}">В наявності</span>
              <span class="out-stock" th:unless="${p.inStock}">Немає в наявності</span>
            </div>
          </div>
        </label>
      </div>

      <div class="track-bar">
        <p>Виберіть по 1 товару з кожного магазину, потім натисніть кнопку</p>
        <button type="submit" class="track-all-btn">Слідкувати за групою</button>
      </div>
    </form>
  </div>

  <div th:if="${query != null and !query.isEmpty() and (results == null or results.isEmpty())}" class="empty">
    Нічого не знайдено за запитом "<span th:text="${query}"></span>"
  </div>
  <div th:if="${query == null or query.isEmpty()}" class="empty">
    Введіть назву товару для пошуку у Citrus, OpenShop та StoreInUA
  </div>
</div>
</body>
</html>
