<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Відстежувані групи – PriceRadar</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: sans-serif; background: #0f0f1a; color: #ddd; margin: 0; }
    .container { max-width: 900px; margin: 0 auto; padding: 24px; }
    h1 { color: #e94560; font-size: 22px; margin-bottom: 8px; }
    .subtitle { font-size: 13px; color: #555; margin-bottom: 16px; }
    .top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 8px; }
    .check-btn { padding: 5px 12px; background: transparent; border: 1px solid #4ade80; color: #4ade80; border-radius: 4px; cursor: pointer; font-size: 12px; }
    .check-btn:hover { background: #4ade80; color: #0f0f1a; }
    .group-card { background: #1a1a2e; border-radius: 8px; margin-bottom: 20px; overflow: hidden; }
    .group-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; border-bottom: 1px solid #0f0f1a; gap: 12px; flex-wrap: wrap; }
    .min-price-block { display: flex; flex-direction: column; }
    .min-price-label { font-size: 12px; color: #aaa; margin-bottom: 2px; }
    .min-price-value { font-size: 20px; font-weight: bold; color: #4ade80; text-decoration: none; }
    .min-price-value:hover { text-decoration: underline; }
    .min-price-shop { font-size: 11px; color: #555; margin-top: 2px; }
    .group-date { font-size: 12px; color: #555; }
    .header-actions { display: flex; align-items: center; gap: 8px; margin-left: auto; }
    .test-btn { padding: 5px 12px; background: transparent; border: 1px solid #7eb8f7; color: #7eb8f7; border-radius: 4px; cursor: pointer; font-size: 12px; }
    .test-btn:hover { background: #7eb8f7; color: #0f0f1a; }
    .delete-btn { padding: 5px 12px; background: transparent; border: 1px solid #e94560; color: #e94560; border-radius: 4px; cursor: pointer; font-size: 12px; }
    .delete-btn:hover { background: #e94560; color: white; }
    .trend-btn { padding: 5px 12px; background: transparent; border: 1px solid #a78bfa; color: #a78bfa; border-radius: 4px; font-size: 12px; text-decoration: none; display: inline-block; }
    .trend-btn:hover { background: #a78bfa; color: #0f0f1a; }
    .group-items { padding: 0 18px 14px; }
    .item-row { display: flex; align-items: flex-start; gap: 12px; padding: 12px 0; border-bottom: 1px solid #13132a; }
    .item-row:last-child { border-bottom: none; }
    .marketplace-badge { background: #0f0f1a; padding: 3px 8px; border-radius: 3px; font-size: 11px; color: #7eb8f7; white-space: nowrap; flex-shrink: 0; margin-top: 2px; }
    .item-info { flex: 1; min-width: 0; }
    .item-title a { color: #ddd; text-decoration: none; font-size: 14px; }
    .item-title a:hover { color: #7eb8f7; text-decoration: underline; }
    .item-price { font-size: 14px; font-weight: bold; color: #4ade80; margin-top: 3px; }
    .item-price.na { color: #555; font-weight: normal; }
    .empty { color: #555; text-align: center; padding: 60px; }
    .alert { padding: 10px 14px; border-radius: 4px; margin-bottom: 16px; font-size: 14px; }
    .alert-success { background: #1a3a2e; color: #4ade80; }
    .alert-error { background: #3a1a1a; color: #e94560; }
  </style>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container">

  <div class="alert alert-success" th:if="${success}" th:text="${success}"></div>
  <div class="alert alert-error" th:if="${error}" th:text="${error}"></div>

  <div class="top-bar">
    <div>
      <h1 style="margin:0">Відстежувані групи</h1>
      <p class="subtitle" style="margin:4px 0 0"
         th:text="|Щодня о ${checkHour}:00 перевіряємо ціни й надсилаємо сповіщення у Telegram при зміні мінімальної ціни|"></p>
    </div>
  </div>

  <div th:if="${groups != null and !groups.isEmpty()}">
    <div class="group-card" th:each="group : ${groups}">
      <div class="group-header">

        <!-- Min price → links to cheapest item -->
        <div class="min-price-block" th:with="cheapest=${group.minPriceItem()}">
          <span class="min-price-label">Мінімальна ціна у групі</span>
          <a th:if="${cheapest != null and group.lastMinPrice != null}"
             th:href="${cheapest.url}" target="_blank"
             class="min-price-value"
             th:text="${group.lastMinPrice + ' грн'}">-</a>
          <span th:unless="${cheapest != null and group.lastMinPrice != null}"
                class="min-price-value"
                th:text="${group.lastMinPrice != null ? group.lastMinPrice + ' грн' : 'N/A'}">-</span>
          <span class="min-price-shop"
                th:if="${cheapest != null}"
                th:text="${cheapest.marketplace}"></span>
        </div>

        <span class="group-date"
              th:text="${group.createdAt != null and #strings.length(group.createdAt) >= 10 ? #strings.substring(group.createdAt, 0, 10) : ''}"></span>

        <div class="header-actions">
          <form method="post" th:action="@{'/tracked/check-group/' + ${group.id}}"
                th:if="${showCheckButton and group.hasStaleItems}">
            <button type="submit" class="check-btn" title="Перевірити актуальні ціни для цієї групи">↻ Перевірити ціни зараз</button>
          </form>
          <a class="trend-btn" th:href="@{'/trends/' + ${group.id}}" title="Графік тенденції цін">📈 Графік</a>
          <form method="post" th:action="@{'/tracked/test-notify/' + ${group.id}}">
            <button type="submit" class="test-btn" title="Надіслати тестове сповіщення у Telegram">Тест</button>
          </form>
          <form method="post" th:action="@{/tracked/delete-group}"
                onsubmit="return confirm('Видалити групу?')">
            <input type="hidden" name="groupId" th:value="${group.id}">
            <button type="submit" class="delete-btn">Видалити</button>
          </form>
        </div>
      </div>

      <div class="group-items">
        <div class="item-row" th:each="item : ${group.items}">
          <a class="marketplace-badge" th:href="${item.url}" target="_blank"
             th:text="${item.marketplace}">M</a>
          <div class="item-info">
            <div class="item-title">
              <a th:href="${item.url}" target="_blank" th:text="${item.title}">Title</a>
            </div>
            <div th:if="${item.currentPrice != null}"
                 class="item-price" th:text="${item.currentPrice + ' грн'}">0</div>
            <div th:unless="${item.currentPrice != null}"
                 class="item-price na">N/A</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div th:if="${groups == null or groups.isEmpty()}" class="empty">
    Немає відстежуваних груп.
    <a th:href="@{/search}" style="color:#e94560">Знайдіть товари і додайте групу</a>.
  </div>
</div>
</body>
</html>
