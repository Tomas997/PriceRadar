spring.application.name=product-service
server.port=8081

spring.datasource.url=jdbc:h2:file:./data/product;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

logging.level.org.example.productservice=DEBUG

telegram.bot.token=${TELEGRAM_BOT_TOKEN:}
parser.service.url=${PARSER_SERVICE_URL:http://localhost:8082}

price.check.cron=${PRICE_CHECK_CRON:0 0 10 * * *}
