services:

  # ── Microservices ───────────────────────────────────────────────────────
  parser-service:
    build:
      context: .
      dockerfile: parser-service/Dockerfile
    container_name: priceradar-parser
    ports:
      - "8082:8082"
    environment:
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-secret}
    restart: on-failure

  product-service:
    build:
      context: .
      dockerfile: product-service/Dockerfile
    container_name: priceradar-product
    ports:
      - "8081:8081"
    environment:
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-secret}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      PARSER_SERVICE_URL: http://parser-service:8082
    volumes:
      - product_data:/app/data
    depends_on:
      - parser-service
    restart: on-failure

  user-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    container_name: priceradar-user
    ports:
      - "8083:8083"
    environment:
      JWT_SECRET: ${JWT_SECRET:-priceradar-secret-key-must-be-at-least-32-characters-long}
    volumes:
      - user_data:/app/data
    restart: on-failure

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: priceradar-gateway
    ports:
      - "8080:8080"
    environment:
      PARSER_SERVICE_URL: http://parser-service:8082
      PRODUCT_SERVICE_URL: http://product-service:8081
      USER_SERVICE_URL: http://user-service:8083
      CORS_ALLOWED_ORIGIN: ${CORS_ALLOWED_ORIGIN:-http://localhost:8084}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-secret}
      JWT_SECRET: ${JWT_SECRET:-priceradar-secret-key-must-be-at-least-32-characters-long}
    depends_on:
      - parser-service
      - product-service
      - user-service
    restart: on-failure

  frontend-service:
    build:
      context: .
      dockerfile: frontend-service/Dockerfile
    container_name: priceradar-frontend
    ports:
      - "8084:8084"
    environment:
      GATEWAY_URL: http://api-gateway:8080
    depends_on:
      - api-gateway
    restart: on-failure

volumes:
  product_data:
  user_data: