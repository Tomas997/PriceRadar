services:

  # ── Infrastructure ──────────────────────────────────────────────────────
  postgres:
    image: postgres:16
    container_name: priceradar-db
    environment:
      POSTGRES_DB: priceradar
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Microservices ───────────────────────────────────────────────────────
  parser-service:
    build: ./parser-service
    container_name: priceradar-parser
    ports:
      - "8082:8082"
    restart: on-failure

  product-service:
    build: ./product-service
    container_name: priceradar-product
    ports:
      - "8081:8081"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/priceradar
      DB_USER: postgres
      DB_PASSWORD: postgres
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  user-service:
    build: ./user-service
    container_name: priceradar-user
    ports:
      - "8083:8083"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/priceradar
      DB_USER: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: ${JWT_SECRET:-priceradar-secret-key-must-be-at-least-32-characters-long}
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  api-gateway:
    build: ./api-gateway
    container_name: priceradar-gateway
    ports:
      - "8080:8080"
    environment:
      PARSER_SERVICE_URL: http://parser-service:8082
      PRODUCT_SERVICE_URL: http://product-service:8081
      USER_SERVICE_URL: http://user-service:8083
    depends_on:
      - parser-service
      - product-service
      - user-service
    restart: on-failure

  frontend-service:
    build: ./frontend-service
    container_name: priceradar-frontend
    ports:
      - "8084:8084"
    environment:
      GATEWAY_URL: http://api-gateway:8080
    depends_on:
      - api-gateway
    restart: on-failure

volumes:
  postgres_data:
